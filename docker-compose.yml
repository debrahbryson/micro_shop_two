services:
  auth_service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    environment:
      - SECRET_KEY=replace_this_with_a_strong_secret
    ports:
      - "8001:8001"

  product_service:
    build:
      context: .
      dockerfile: product_service/Dockerfile
    environment:
      - SECRET_KEY=replace_this_with_a_strong_secret
    ports:
      - "8002:8002"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth_service
      - product_service
